name: Build and Release

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3

      - name: Build
        run: task build

      - name: Make executable
        run: chmod +x data/fc-entrypoint

      - name: Get git commit
        id: sha
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install gh CLI
        run: |
          wget https://github.com/cli/cli/releases/download/v2.83.2/gh_2.83.2_linux_amd64.tar.gz
          tar -xzf gh_2.83.2_linux_amd64.tar.gz
          mv gh_2.83.2_linux_amd64/bin/gh /usr/local/bin/

      - name: Create release
        run: |
          gh release create ${{ steps.sha.outputs.SHA_SHORT }} \
            --title "Release ${{ steps.sha.outputs.SHA_SHORT }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          gh release upload ${{ steps.sha.outputs.SHA_SHORT }} "data/fc-entrypoint" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
